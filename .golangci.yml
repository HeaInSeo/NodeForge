version: "2"

run:
  allow-parallel-runners: true
  timeout: 5m

linters:
  default: none

  enable:
    - bodyclose
    - copyloopvar
    - dupl
    - errcheck
    - errorlint
    - funlen
    - gocheckcompilerdirectives
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused

  settings:
    dupl:
      threshold: 100

    funlen:
      lines: 100
      statements: 50

    goconst:
      min-len: 2
      min-occurrences: 3

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - ifElseChain
        - whyNoLint

    gocyclo:
      min-complexity: 20

    govet:
      enable:
        - nilness
        - shadow

    lll:
      line-length: 120

    misspell:
      locale: US

    nolintlint:
      allow-unused: true
      require-explanation: false
      require-specific: true

    revive:
      rules:
        - name: indent-error-flow
        - name: unexported-return
          disabled: true
        - name: unused-parameter
        - name: unused-receiver

  exclusions:
    generated: lax

    rules:
      - path: ".*_test\\.go"
        linters:
          - dupl
          - funlen
          - lll

      - path: ".*\\.pb\\.go$"
        linters:
          - revive
          - lll
          - gosec
          - unused
          - gocritic

      - path: ".*_grpc\\.pb\\.go$"
        linters:
          - revive
          - lll
          - gosec
          - unused
          - gocritic

    paths:
      - vendor$
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/HeaInSeo/NodeVault

  exclusions:
    generated: lax
    paths:
      - vendor$
      - third_party$
      - builtin$
      - examples$
