---
# Internal container registry for NodeForge build artifacts.
# Deployed as NodePort 31500 — accessible from both host and cluster pods.
# Uses emptyDir storage (survives pod restarts within a session, not across node restarts).
#
# Access:
#   From host:    http://<node-ip>:31500
#   From pods:    http://<any-node-ip>:31500  (NodePort is exposed on all nodes)
#
# kaniko args include --insecure --skip-tls-verify for this HTTP-only registry.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodeforge-registry
  namespace: nodeforge-system
  labels:
    app: nodeforge-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodeforge-registry
  template:
    metadata:
      labels:
        app: nodeforge-registry
    spec:
      containers:
        - name: registry
          image: registry:2
          ports:
            - containerPort: 5000
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          volumeMounts:
            - name: storage
              mountPath: /var/lib/registry
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nodeforge-registry
  namespace: nodeforge-system
  labels:
    app: nodeforge-registry
spec:
  type: NodePort
  selector:
    app: nodeforge-registry
  ports:
    - name: registry
      port: 5000
      targetPort: 5000
      nodePort: 31500
