---
# ServiceAccount for NodeVault controlplane (in-cluster 배포용).
# I-3에서 in-process 이미지 빌드 경로로 전환함에 따라 RBAC을 간소화했다:
#   - 제거: configmaps (Dockerfile ConfigMap), pods/log (kaniko 로그 스트리밍)
#   - 유지: namespaces, jobs, pods (L3 dry-run + L4 smoke run)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nodevault-controlplane
  namespace: nodevault-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nodevault-controlplane
rules:
  # Namespace 생성 (nodevault-smoke 자동 생성)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create"]
  # L3 dry-run + L4 smoke run Job 관리
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete", "watch"]
  # L4 smoke run 로그 수집
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nodevault-controlplane
subjects:
  - kind: ServiceAccount
    name: nodevault-controlplane
    namespace: nodevault-system
roleRef:
  kind: ClusterRole
  name: nodevault-controlplane
  apiGroup: rbac.authorization.k8s.io
