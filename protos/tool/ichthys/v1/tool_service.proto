syntax = "proto3";

package ichthys;

option go_package = "github.com/HeaInSeo/NodeForge/protos/tool/ichthys/v1;toolv1";

message ToolMetadata {
  string display_name = 1;
  string version = 2;
  string category = 3;
  string description = 4;
  repeated string input_formats = 5;
  repeated string output_formats = 6;
  Resources resources = 7;
  Signature signature = 8;
  string documentation_url = 9;
  SecurityStatus security_status = 10;
  RegistryInfo registry_info = 11;
}

message RegistryInfo {
  string host = 1;
  string repository = 2;
  string tag = 3;
  string digest = 4;
}

message Resources {
  uint32 min_cpu_threads = 1;
  uint32 rec_cpu_threads = 2;
  uint64 min_memory_mb = 3;
  uint64 rec_memory_mb = 4;
  uint64 temp_disk_size_mb = 5;
}

message SecurityStatus {
  int32 critical = 1;
  int32 high = 2;
  int32 medium = 3;
  int32 low = 4;
  string last_scanned = 5;
}

message Signature {
  bool signed = 1;
  repeated string signers = 2;
}
